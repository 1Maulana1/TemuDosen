<h1 class="font-headline-md text-[26px] text-gray-800 tracking-tight">TemuDosen</h1>
<p class="font-body-sm text-gray-500 mt-1">Platform Bimbingan Skripsi Digital</p>
</div>
<!-- Role Selector Tabs -->
<div class="w-full mb-8">
<label class="block text-center text-xs font-semibold uppercase tracking-wider text-gray-400 mb-3">Masuk sebagai</label>
<div class="bg-gray-100 p-1 rounded-full flex gap-1">
<button class="flex-1 py-2 text-[13px] font-semibold text-gray-800 bg-white rounded-full shadow-sm transition-all duration-200" id="tab-mahasiswa">Mahasiswa</button>
<button class="flex-1 py-2 text-[13px] font-semibold text-gray-500 hover:text-gray-700 transition-all duration-200" id="tab-dosen">Dosen</button>
<button class="flex-1 py-2 text-[13px] font-semibold text-gray-500 hover:text-gray-700 transition-all duration-200" id="tab-admin">Admin</button>
<button class="flex-1 py-2 text-[13px] font-semibold text-gray-500 hover:text-gray-700 transition-all duration-200" id="tab-kaprodi">Kaprodi</button>
</div>
</div>
<!-- Login Form -->
<form class="w-full space-y-5" onsubmit="return false;">
<div>
<label class="block font-label-bold text-gray-700 mb-1.5" for="identifier">NIM / NIDN</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-[20px]">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all text-sm outline-none" id="identifier" name="identifier" placeholder="Masukkan NIM atau NIDN" type="text"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-1.5">
<label class="block font-label-bold text-gray-700" for="password">Kata Sandi</label>
<a class="text-xs font-bold text-[#B45309] hover:underline" href="#">Lupa kata sandi?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-[20px]">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all text-sm outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="eye-icon">visibility</span>
</button>
</div>
</div>
<!-- CTA Button -->
<button class="w-full bg-[#F59E0B] hover:bg-[#D97706] text-[#1F2937] font-headline-md text-[15px] py-4 rounded-xl shadow-lg shadow-amber-500/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-2" type="submit">
                    Masuk
                </button>
</form>
<!-- Bottom Action -->
<div class="mt-8 w-full">
<div class="relative flex items-center mb-6">
<div class="flex-grow border-t border-gray-100"></div>
<span class="flex-shrink mx-4 text-xs text-gray-400 uppercase tracking-widest">atau</span>
<div class="flex-grow border-t border-gray-100"></div>
</div>
<p class="text-center text-[13px] text-gray-500">
                    Belum punya akun? <a class="text-[#B45309] font-bold hover:underline" href="#">Hubungi Admin</a>
</p>
</div>
</div>
</main>
<!-- Footer Outside Card -->
<footer class="pb-8 w-full text-center flex flex-col gap-1 px-4">
<p class="font-body-sm text-[12px] text-white/80 mix-blend-overlay">
            © 2024 TemuDosen · Universitas Nusantara. All rights reserved.
        </p>
<p class="font-body-sm text-[11px] text-white/70 mix-blend-overlay">
            Didukung oleh sistem bimbingan digital terintegrasi
        </p>
</footer>
<script>
        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                eyeIcon.textContent = 'visibility_off';
            } else {
                pwdInput.type = 'password';
                eyeIcon.textContent = 'visibility';
            }
        }

        // Simple Tab Logic
        const tabs = ['tab-mahasiswa', 'tab-dosen', 'tab-admin', 'tab-kaprodi'];
        tabs.forEach(tabId => {
            document.getElementById(tabId).addEventListener('click', (e) => {
                tabs.forEach(id => {
                    const el = document.getElementById(id);
                    el.classList.remove('bg-white', 'shadow-sm', 'text-gray-800');
                    el.classList.add('text-gray-500');
                });
                e.target.classList.add('bg-white', 'shadow-sm', 'text-gray-800');
                e.target.classList.remove('text-gray-500');
            });
        });
    </script>
</body></html>
