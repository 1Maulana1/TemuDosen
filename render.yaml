# Render Blueprint — deploy backend TemuDosen (Django + PostgreSQL, plan free)
# Cara pakai: dashboard.render.com → New → Blueprint → pilih repo ini.
# Catatan free tier: service tidur saat idle (cold start ~30 dtk) dan
# PostgreSQL free kedaluwarsa ~30 hari. Migrate + seed_admin dijalankan
# di start command karena preDeployCommand tidak tersedia di plan free.

services:
  - type: web
    name: temudosen-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    # start.sh = gunicorn + Celery worker (bila STT_LLM_ENABLED=True) satu container
    dockerCommand: sh -c "python manage.py migrate && python manage.py seed_admin && sh start.sh"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: temudosen-db
          property: connectionString
      # Leading dot = wildcard, aman walau Render menambah suffix pada nama service
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://temudosen.vercel.app
      - key: COOKIE_SAMESITE
        value: "None"
      - key: FRONTEND_URL
        value: https://temudosen.vercel.app
      # ── Pipeline STT/LLM (opsional) ──────────────────────────────────
      # Aktifkan dengan mengubah STT_LLM_ENABLED ke "True" dan mengisi
      # GROQ_API_KEY + ANTHROPIC_API_KEY di dashboard (sync: false).
      - key: STT_LLM_ENABLED
        value: "False"
      - key: STT_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: temudosen-redis
          property: connectionString

  # Redis (Render "Key Value", plan free) — broker Celery untuk pipeline STT/LLM
  - type: keyvalue
    name: temudosen-redis
    plan: free
    ipAllowList: []  # hanya akses internal antar service Render

databases:
  - name: temudosen-db
    plan: free
